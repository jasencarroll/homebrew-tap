name: Update Qdrant Formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Qdrant version (e.g. 1.18.0). Leave blank to auto-detect latest."
        required: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            version="${{ github.event.inputs.version }}"
          else
            latest=$(gh release view --repo qdrant/qdrant --json tagName -q .tagName)
            version="${latest#v}"
          fi

          current=$(grep 'version "' Formula/qdrant.rb | head -1 | sed 's/.*version "//;s/"//')

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "Resolved: $version (current: $current)"

      - name: Update formula
        if: steps.release.outputs.version != steps.release.outputs.current
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          curl -sL "https://github.com/qdrant/qdrant/releases/download/v${VERSION}/qdrant-aarch64-apple-darwin.tar.gz" \
            -o /tmp/qdrant-arm64.tar.gz
          curl -sL "https://github.com/qdrant/qdrant/releases/download/v${VERSION}/qdrant-x86_64-apple-darwin.tar.gz" \
            -o /tmp/qdrant-x86.tar.gz

          SHA_ARM=$(sha256sum /tmp/qdrant-arm64.tar.gz | awk '{print $1}')
          SHA_X86=$(sha256sum /tmp/qdrant-x86.tar.gz | awk '{print $1}')

          CUR_VERSION=${{ steps.release.outputs.current }}
          CUR_SHA_ARM=$(awk '/arm/,/sha256/' Formula/qdrant.rb | grep sha256 | head -1 | sed 's/.*sha256 "//;s/"//')
          CUR_SHA_X86=$(awk '/else/,/sha256/' Formula/qdrant.rb | grep sha256 | head -1 | sed 's/.*sha256 "//;s/"//')

          sed -i "s/version \"${CUR_VERSION}\"/version \"${VERSION}\"/" Formula/qdrant.rb
          sed -i "0,/sha256 \"${CUR_SHA_ARM}\"/s//sha256 \"${SHA_ARM}\"/" Formula/qdrant.rb
          sed -i "s/sha256 \"${CUR_SHA_X86}\"/sha256 \"${SHA_X86}\"/" Formula/qdrant.rb

          cat Formula/qdrant.rb

      - name: Push update
        if: steps.release.outputs.version != steps.release.outputs.current
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/qdrant.rb
          git commit -m "qdrant: update to v${VERSION}"
          git push
